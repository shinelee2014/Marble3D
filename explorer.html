    function parseQuizMarkdown(markdown) {
      if (!markdown) return '';
      
      // 1. Extract Teaching Goals
      let goalsHtml = '';
      const goalsMatch = markdown.match(/## ✨ 教学目标设定([\s\S]*?)(?=##|$)/);
      if (goalsMatch) {
        const goalsText = goalsMatch[1].trim();
        const goalsList = goalsText.split('\n')
          .map(line => line.trim())
          .filter(line => line.length > 0)
          .map(line => `<li>${line.replace(/^\d+[\.\、\s]*/, '')}</li>`)
          .join('');
        goalsHtml = `
          <div style="background: linear-gradient(135deg, rgba(79, 70, 229, 0.15), rgba(99, 102, 241, 0.05)); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 8px; padding: 0.8rem; margin-bottom: 1rem; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.1);">
            <div style="font-weight: 600; color: #818cf8; font-size: 0.85rem; margin-bottom: 0.4rem;">
              🎯 核心教学目标 (家校协同辅导重点)
            </div>
            <ul style="margin: 0; padding-left: 1.2rem; font-size: 0.78rem; color: #d1d5db; line-height: 1.5; list-style-type: decimal;">
              ${goalsList}
            </ul>
          </div>
        `;
      }

      // 2. Extract Questions
      const questions = [];
      const questionBlocks = markdown.split(/###\s+第/);
      questionBlocks.forEach((block, idx) => {
        if (idx === 0) return;
        const fullBlock = "第" + block;
        
        let title = "趣味练习题";
        const titleMatch = fullBlock.match(/^(第\s*\d+\s*题：[^\n]*)/);
        if (titleMatch) title = titleMatch[1].trim();
        
        const stemMatch = fullBlock.match(/【题干】([\s\S]*?)(?=【✍️|【✅|【💡|###|$)/);
        const stepsMatch = fullBlock.match(/【✍️ 解题步骤】([\s\S]*?)(?=【✅|【💡|###|$)/);
        const answerMatch = fullBlock.match(/【✅ 参考答案】([\s\S]*?)(?=【💡|###|$)/);
        const hintMatch = fullBlock.match(/【💡 思考提示】([\s\S]*?)(?=###|$)/);
        
        const stem = stemMatch ? stemMatch[1].trim() : '（生成中...）';
        const steps = stepsMatch ? stepsMatch[1].trim() : '';
        const answer = answerMatch ? answerMatch[1].trim() : '';
        const hint = hintMatch ? hintMatch[1].trim() : '';
        
        if (stem) {
          questions.push({ title, stem, steps, answer, hint });
        }
      });

      if (questions.length === 0) {
        // Fallback parser: just format markdown as plain text
        return `<div style="font-size: 0.8rem; color: #d1d5db; white-space: pre-wrap; line-height: 1.5;">${markdown}</div>`;
      }

      const quizId = Math.random().toString(36).substr(2, 9);
      let questionsHtml = questions.map((q, i) => {
        const qKey = `q_${quizId}_${i}`;
        return `
          <div style="border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 1rem; margin-bottom: 1rem; last-child: { border: none; margin-bottom: 0; }">
            <div style="font-weight: 600; color: #f3f4f6; margin-bottom: 0.4rem; font-size: 0.85rem;">📝 ${q.title}</div>
            <div style="font-size: 0.8rem; color: #e5e7eb; line-height: 1.5; margin-bottom: 0.8rem; background: rgba(255,255,255,0.02); padding: 0.6rem; border-radius: 6px; border: 1px solid rgba(255,255,255,0.04);">${q.stem.replace(/\n/g, '<br>')}</div>
            
            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
              ${q.hint ? `
                <div>
                  <button class="three-state-btn hint-btn" onclick="toggleThreeState('${qKey}_hint')">
                    💡 获得提示 (思路点拨)
                  </button>
                  <div id="${qKey}_hint" class="three-state-panel hint-panel" style="display: none;">
                    ${q.hint.replace(/\n/g, '<br>')}
                  </div>
                </div>
              ` : ''}
              
              ${q.steps ? `
                <div>
                  <button class="three-state-btn steps-btn" onclick="toggleThreeState('${qKey}_steps')">
                    ✍️ 解题步骤 (详细推导)
                  </button>
                  <div id="${qKey}_steps" class="three-state-panel steps-panel" style="display: none;">
                    ${q.steps.replace(/\n/g, '<br>')}
                  </div>
                </div>
              ` : ''}
              
              ${q.answer ? `
                <div>
                  <button class="three-state-btn answer-btn" onclick="toggleThreeState('${qKey}_answer')">
                    ✅ 核对答案
                  </button>
                  <div id="${qKey}_answer" class="three-state-panel answer-panel" style="display: none;">
                    ${q.answer.replace(/\n/g, '<br>')}
                  </div>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');

      return goalsHtml + questionsHtml;
    }

    window.generateAIQuiz = async function(topicId) {
      const topic = state.topicMap[topicId];
      if (!topic) return;
      const container = document.getElementById(`quiz-box-inner-${topicId}`);
      if (!container) return;
      
      const activeProfile = state.profiles.find(p => p.id === state.activeProfileId);
      const childName = activeProfile ? activeProfile.name : "孩子";
      const grade = activeProfile ? activeProfile.grade : 2;
      
      const originalHtml = container.innerHTML;
      
      container.innerHTML = `
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; gap: 0.6rem; color: #a5b4fc;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin-animation">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
          </svg>
          <div style="font-size: 0.8rem; font-weight: 500;">🤖 AI 正在出题中，这大约需要 15-30 秒...</div>
          <div style="font-size: 0.7rem; color: var(--text-secondary);">正在连接本地 LM Studio 精密模型进行苏教版教学目标对齐</div>
        </div>
      `;
      
      try {
        const res = await fetch("/api/generate-questions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            topicName: topic.name,
            subject: topic.subject,
            profileName: childName,
            grade: grade
          })
        });
        const data = await res.json();
        if (data.error) {
          throw new Error(data.error);
        }
        if (data.markdown) {
          state.aiQuizzes = state.aiQuizzes || {};
          state.aiQuizzes[topicId] = data.markdown;
          container.innerHTML = parseQuizMarkdown(data.markdown);
        } else {
          throw new Error("No quiz data returned");
        }
      } catch (e) {
        console.error("AI quiz generation failed:", e);
        container.innerHTML = `
          <div style="background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.25); padding: 0.8rem; border-radius: 8px; margin-bottom: 0.8rem; font-size: 0.78rem; color: #fca5a5; line-height: 1.4;">
            ⚠️ <strong>出题失败</strong>：${e.message || '本地 AI (LM Studio) 连接失败'}<br>
            请确认您的 LM Studio (127.0.0.1:1234) 已启动并加载了模型。您可以点击下方复制 Prompt 手动出题。
          </div>
          ${originalHtml}
        `;
      }
    };

    async function selectTopic(topicId) {
      state.selectedTopicId = topicId;
      
      // Calculate cascading ancestors and descendants
      state.selectedAncestors = state.selectedAncestors || new Set();
      state.selectedDescendants = state.selectedDescendants || new Set();
      state.selectedAncestors.clear();
      state.selectedDescendants.clear();
      
      function traceAncestors(id) {
        const pList = state.prereqMap[id] || [];
        pList.forEach(p => {
          if (!state.selectedAncestors.has(p.prerequisiteId)) {
            state.selectedAncestors.add(p.prerequisiteId);
            traceAncestors(p.prerequisiteId);
          }
        });
      }
      
      function traceDescendants(id) {
        const uList = state.unlockMap[id] || [];
        uList.forEach(u => {
          if (!state.selectedDescendants.has(u.topicId)) {
            state.selectedDescendants.add(u.topicId);
            traceDescendants(u.topicId);
          }
        });
      }
      
      if (topicId) {
        traceAncestors(topicId);
        traceDescendants(topicId);
      }
      
      // Calculate target angle to rotate selected node to center-front
      if (topicId && viz.nodes && viz.nodes.length > 0) {
        const node = viz.nodes.find(n => n.id === topicId);
        if (node) {
          let targetY = Math.atan2(node.x, node.z);
          let z1 = node.x * Math.sin(targetY) + node.z * Math.cos(targetY);
          let targetX = Math.atan2(node.y, z1);
          
          let diffY = -targetY - viz.angleY;
          while (diffY < -Math.PI) diffY += Math.PI * 2;
          while (diffY > Math.PI) diffY -= Math.PI * 2;
          viz.targetAngleY = viz.angleY + diffY;
          
          let diffX = -targetX - viz.angleX;
          while (diffX < -Math.PI) diffX += Math.PI * 2;
          while (diffX > Math.PI) diffX -= Math.PI * 2;
          viz.targetAngleX = viz.angleX + diffX;
          
          viz.isAnimating = true;
        }
      }

      const topic = state.topicMap[topicId];
      const panel = document.getElementById('detail-panel');
      
      const prereqs = state.prereqMap[topicId] || [];
      const unlocks = state.unlockMap[topicId] || [];
      
      const activeProfile = state.profiles.find(p => p.id === state.activeProfileId);
      const childName = activeProfile ? activeProfile.name : "孩子";
      
      // Setup translations variables
      state.translations = state.translations || {};
      state.showEnglish = state.showEnglish !== undefined ? state.showEnglish : false;
      
      // Load translations asynchronously for dependency reasons
      const reasonsToTranslate = [];
      prereqs.forEach(p => { if (p.reason) reasonsToTranslate.push(p.reason); });
      unlocks.forEach(u => { if (u.reason) reasonsToTranslate.push(u.reason); });
      
      const missing = reasonsToTranslate.filter(r => !state.translations[r]);
      if (missing.length > 0) {
        try {
          const res = await fetch('/api/translate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ texts: missing })
          });
          const data = await res.json();
          if (data.translations) {
            Object.assign(state.translations, data.translations);
          }
        } catch (e) {
          console.error("Translation failed:", e);
        }
      }
      
      const unmasteredPrereqs = [];
      prereqs.forEach(p => {
        const status = state.mastery[p.prerequisiteId] || 'unmarked';
        if (status !== 'mastered') {
          unmasteredPrereqs.push(state.topicMap[p.prerequisiteId]);
        }
      });
      
      const assessmentHtml = topic.assessmentPrompt ? 
        topic.assessmentPrompt.replace(/{{name}}/g, `<strong style="color: #fff; text-shadow: 0 0 5px rgba(59, 130, 246, 0.4);">${childName}</strong>`) : 
        '无口头提问模版';
        
      const status = state.mastery[topicId] || 'unmarked';
      const pblHtml = generatePBLCard(topicId, prereqs);
      
      panel.innerHTML = `
        <div class="detail-card">
          <div class="detail-header">
            <div class="detail-title-area">
              <h2>${topic.name}</h2>
              <div class="detail-metadata">
                <span class="meta-tag">学科: <strong>${topic.subject}</strong></span>
                <span class="meta-tag">领域: <strong>${topic.domain ?? '默认'}</strong></span>
                <span class="meta-tag">适合年龄: <strong>${topic.ageRangeStart ?? '?'}-${topic.ageRangeEnd ?? '?'} 岁</strong></span>
                <span class="meta-tag">核心类型: <strong>${topic.type}</strong></span>
                ${topic.centrality ? `<span class="meta-tag">核心权重: <strong>${topic.centrality.toFixed(3)}</strong></span>` : ''}
              </div>
            </div>
            
            <div class="mastery-controls-group">
              <button class="mastery-btn ${status === 'mastered' ? 'active-mastered' : ''}" onclick="setMasteryStatus('${topicId}', 'mastered')">
                ✓ 已通关
              </button>
              <button class="mastery-btn ${status === 'practice' ? 'active-practice' : ''}" onclick="setMasteryStatus('${topicId}', 'practice')">
                ⚠ 需要练习
              </button>
            </div>
          </div>
          
          <div class="detail-body">
            <!-- Diagnostics Alert if prerequisites are unmastered -->
            ${unmasteredPrereqs.length > 0 ? `
              <div class="diagnostic-warning">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                <span><strong>自适应诊断警告</strong>：${childName} 在挑战本项目前，有 <strong>${unmasteredPrereqs.length} 个前置知识点</strong> 尚未通关！建议先完成下方红色警告的概念。</span>
              </div>
            ` : ''}
          
            <div>
              <div class="section-title">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                概念辅导重点
              </div>
              <p class="desc-text">${topic.description}</p>
            </div>
            
            ${topic.evidence && topic.evidence.length > 0 ? `
              <div>
                <div class="section-title">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                  家长观察依据 (掌握证据)
                </div>
                <ul class="evidence-list">
                  ${topic.evidence.map(e => `<li>${e}</li>`).join('')}
                </ul>
              </div>
            ` : ''}
            
            <div>
              <div class="section-title" style="color: #60a5fa">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                亲子诊断随口问 (互动评估)
              </div>
              <div class="prompt-box">
                ${assessmentHtml}
              </div>
            </div>

            <div>
              <div class="section-title" style="color: #10b981; display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <span style="display: flex; align-items: center; gap: 0.3rem;">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
                  随堂自主练习 (课后作业题)
                </span>
                <button class="ai-header-btn" onclick="generateAIQuiz('${topicId}')">✨ AI 一键出题</button>
              </div>
              <div class="prompt-box" style="border-color: rgba(16, 185, 129, 0.3); background-color: rgba(16, 185, 129, 0.03); color: var(--text-primary);">
                <div id="quiz-box-inner-${topicId}">
                  ${state.aiQuizzes && state.aiQuizzes[topicId] ? parseQuizMarkdown(state.aiQuizzes[topicId]) : generateExercisesHtml(topic)}
                </div>
              </div>
            </div>
            
            ${topic.standards && topic.standards.length > 0 ? `
              <div>
                <div class="section-title" style="font-size: 0.85rem; margin-top: 0.5rem;">
                  对齐的教学标准编码: ${topic.standards.map(s => `<span class="standard-badge">${s}</span>`).join('')}
                </div>
              </div>
            ` : ''}
          </div>
        </div>

        <!-- STEAM Card Section -->
        ${pblHtml}

        <div class="relationship-grid">
          <div class="relation-card">
            <div class="section-title" style="color: #60a5fa; display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <span style="display: flex; align-items: center; gap: 0.3rem;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                前置技能 Prerequisites (${prereqs.length})
              </span>
              <button class="lang-toggle-btn" onclick="toggleLanguage()">🌐 ${state.showEnglish ? '显示中文' : 'Show English'}</button>
            </div>
            <div class="relation-list">
              ${prereqs.length === 0 ? '<div style="color: var(--text-secondary); font-size: 0.85rem;">无前置知识要求（入门概念）</div>' : 
                prereqs.map(p => {
                  const pre = state.topicMap[p.prerequisiteId];
                  const preStatus = state.mastery[pre.id] || 'unmarked';
                  return `
                    <div class="relation-item" onclick="selectAndScroll('${pre.id}')" style="border-left-color: var(--color-${pre.subject.split(' ')[0].toLowerCase()})">
                      <div class="relation-item-left">
                        <div class="relation-name">
                          <span class="status-dot ${preStatus}"></span>
                          ${pre.name}
                        </div>
                        ${p.reason ? `<div class="relation-reason">“${state.showEnglish ? p.reason : (state.translations[p.reason] || p.reason)}”</div>` : ''}
                      </div>
                      <div class="relation-badge-group">
                        <span class="subject-badge ${getSubjectClass(pre.subject)}">${pre.subject.substring(0,2)}</span>
                        ${preStatus !== 'mastered' ? `<span class="warning-badge">⚠️ 未通关</span>` : ''}
                      </div>
                    </div>
                  `;
                }).join('')
              }
            </div>
          </div>

          <div class="relation-card">
            <div class="section-title" style="color: #c084fc; display: flex; justify-content: space-between; align-items: center; width: 100%;">
              <span style="display: flex; align-items: center; gap: 0.3rem;">
                解锁后置 Unlocks (${unlocks.length})
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
              </span>
              <button class="lang-toggle-btn" onclick="toggleLanguage()">🌐 ${state.showEnglish ? '显示中文' : 'Show English'}</button>
            </div>
            <div class="relation-list">
              ${unlocks.length === 0 ? '<div style="color: var(--text-secondary); font-size: 0.85rem;">该概念为终端概念，暂无后续解锁概念</div>' : 
                unlocks.map(u => {
                  const target = state.topicMap[u.topicId];
                  const targetStatus = state.mastery[target.id] || 'unmarked';
                  return `
                    <div class="relation-item" onclick="selectAndScroll('${target.id}')" style="border-left-color: var(--color-${target.subject.split(' ')[0].toLowerCase()})">
                      <div class="relation-item-left">
                        <div class="relation-name">
                          <span class="status-dot ${targetStatus}"></span>
                          ${target.name}
                        </div>
                        ${u.reason ? `<div class="relation-reason">“${state.showEnglish ? u.reason : (state.translations[u.reason] || u.reason)}”</div>` : ''}
                      </div>
                      <div class="relation-badge-group">
                        <span class="subject-badge ${getSubjectClass(target.subject)}">${target.subject.substring(0,2)}</span>
                      </div>
                    </div>
                  `;
                }).join('')
              }
            </div>
          </div>
        </div>
      `;
      
      // Highlight in Tree View
      const topicObj = state.topicMap[topicId];
      if (topicObj) {
        const subj = topicObj.subject;
        const gradeName = `${topicObj.ageRangeStart - 5}年级`;
        const gradeKey = `${subj}_${gradeName}`;
        
        state.collapsedTreeSubjects[subj] = false;
        state.collapsedTreeGrades[gradeKey] = false;
        
        if (state.currentView === 'tree') {
          renderTreeView();
        }
      }

      const treeItems = document.querySelectorAll('.tree-node-item');
      treeItems.forEach(item => {
        if (item.getAttribute('data-id') === topicId) {
          item.classList.add('selected');
          item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          item.classList.remove('selected');
        }
      });
    }

    window.setMasteryStatus = function(topicId, status) {
      if (state.mastery[topicId] === status) {
        state.mastery[topicId] = 'unmarked';
      } else {
        state.mastery[topicId] = status;
      }
      saveState();
      renderList();
      selectTopic(topicId);
    };

    window.selectAndScroll = function(topicId) {
      selectTopic(topicId);
      renderList();
      const listItems = document.querySelectorAll('.topic-item');
      for (const item of listItems) {
        if (item.innerHTML.includes(state.topicMap[topicId].name)) {
          item.classList.add('selected');
          item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          break;
        }
      }
    };

    // Listeners
    document.getElementById('search-input').addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      renderList();
    });

    // Draggable Resizers logic
    function initResizers() {
      const container = document.querySelector('.container');
      const leftResizer = document.getElementById('left-resizer');
      const rightResizer = document.getElementById('right-resizer');
      const leftSidebar = document.getElementById('left-sidebar');
      const detailPanel = document.getElementById('detail-panel');

      leftResizer.addEventListener('mousedown', (e) => {
        e.preventDefault();
        container.classList.add('dragging');
        leftResizer.classList.add('dragging');
        const startX = e.clientX;
        const startWidth = leftSidebar.clientWidth;

        function onMouseMove(moveEvent) {
          const deltaX = moveEvent.clientX - startX;
          const newWidth = Math.max(280, Math.min(600, startWidth + deltaX));
          container.style.setProperty('--left-width', `${newWidth}px`);
        }

        function onMouseUp() {
          container.classList.remove('dragging');
          leftResizer.classList.remove('dragging');
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseup', onMouseUp);
          window.dispatchEvent(new Event('resize'));
        }

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
      });

      rightResizer.addEventListener('mousedown', (e) => {
        e.preventDefault();
        container.classList.add('dragging');
        rightResizer.classList.add('dragging');
        const startX = e.clientX;
        const startWidth = detailPanel.clientWidth;

        function onMouseMove(moveEvent) {
          const deltaX = moveEvent.clientX - startX;
          const newWidth = Math.max(350, Math.min(800, startWidth - deltaX));
          container.style.setProperty('--right-width', `${newWidth}px`);
        }

        function onMouseUp() {
          container.classList.remove('dragging');
          rightResizer.classList.remove('dragging');
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseup', onMouseUp);
          window.dispatchEvent(new Event('resize'));
        }

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
      });
    }

    // Call initResizers on load
    window.addEventListener('DOMContentLoaded', initResizers);

    // Start
    loadData();
  </script>
</body>
</html>
